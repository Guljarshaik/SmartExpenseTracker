<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | Smart Khata Book</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
    }

    /* Navbar */
    header {
      background-color: #ff3b3b;
      color: white;
      padding: 1rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 1.5rem;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 1.5rem;
      font-weight: bold;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #ffd6d6;
    }

    /* Container */
    .container {
      padding: 2rem 5%;
      max-width: 500px;
      margin: 0 auto;
    }

    h2 {
      color: #ff3b3b;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    form {
      background: #fff;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1rem;
    }

    button {
      width: 100%;
      padding: 0.8rem;
      background: #ff3b3b;
      border: none;
      border-radius: 5px;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #e02a2a;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <header>
    <h1>Smart Khata</h1>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="add-expense.html">Add Expense</a>
      <a href="add-loan.html">Add Loan</a>
      <a href="reports.html">Reports</a>
      <a href="profile.html">Profile</a>
      <a href="index.html">Logout</a>
    </nav>
  </header>

  <!-- Profile Form -->
  <div class="container">
    <h2>Your Profile</h2>
    <form action="#" method="post">
      <input type="text" name="fullname" placeholder="Full Name" value="John Doe" required>
      <input type="email" name="email" placeholder="Email Address" value="john@example.com" required>
      <input type="tel" name="phone" placeholder="Phone Number" value="9876543210" required>
      <input type="password" name="password" placeholder="New Password">
      <button type="submit">Update Profile</button>
    </form>
  </div>

</body>
</html>
